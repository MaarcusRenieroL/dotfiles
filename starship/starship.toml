add_newline = true
command_timeout = 1200

format = """
$os$username$hostname$directory$git_branch$git_status$git_state$git_metrics$nodejs$java$python$package$docker_context$aws$kubernetes$cmd_duration$jobs$battery
$character
"""

# =========================
# OS / User / Host
# =========================

[os]
disabled = false
style = "bold cyan"

[os.symbols]
Macos = " "

[username]
show_always = false
style_user = "bold green"
style_root = "bold red"
format = "[$user]($style) "

[hostname]
ssh_only = true
style = "bold yellow"
format = "on [$hostname]($style) "

# =========================
# Directory
# =========================

[directory]
style = "bold blue"
truncation_length = 4
truncate_to_repo = true
read_only = " 󰌾"
format = "[$path]($style)[$read_only]($read_only_style) "

# =========================
# Git
# =========================

[git_branch]
symbol = " "
style = "bold purple"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold red"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "=${count} "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
untracked = "?${count} "
stashed = "\\$${count} "
modified = "!${count} "
staged = "+${count} "
renamed = "»${count} "
deleted = "✘${count} "

[git_state]
style = "bold yellow"
format = "\\([$state( $progress_current/$progress_total)]($style)\\) "

[git_metrics]
disabled = false
added_style = "bold green"
deleted_style = "bold red"
format = "([+$added]($added_style) [-$deleted]($deleted_style) )"

# =========================
# Languages / Runtimes
# =========================

[nodejs]
symbol = " "
style = "bold green"
format = "via [$symbol$version]($style) "
detect_files = ["package.json"]

[java]
symbol = " "
style = "bold red"
format = "via [$symbol$version]($style) "
detect_files = ["pom.xml"]

[package]
symbol = "📦 "
style = "bold orange"
format = "is [$symbol$version]($style) "
disabled = false

# =========================
# Cloud / Infra
# =========================

[docker_context]
symbol = " "
style = "bold blue"
format = "via [$symbol$context]($style) "
only_with_files = true

[aws]
symbol = "☁️ "
style = "bold yellow"
format = "on [$symbol$profile( \\($region\\))]($style) "

[kubernetes]
disabled = false
symbol = "☸ "
style = "bold cyan"
format = "on [$symbol$context( \\($namespace\\))]($style) "

# =========================
# System Info
# =========================

[cmd_duration]
min_time = 1000
style = "bold yellow"
format = "took [$duration]($style) "

[jobs]
symbol = "✦ "
style = "bold blue"
format = "[$symbol$number]($style) "

[battery]
full_symbol = "󰁹 "
charging_symbol = "󰂄 "
discharging_symbol = "󰂃 "
unknown_symbol = "󰁽 "
empty_symbol = "󰂎 "
format = "[$symbol$percentage]($style) "

[[battery.display]]
threshold = 25
style = "bold red"

[[battery.display]]
threshold = 50
style = "bold yellow"

# =========================
# Prompt Character
# =========================

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold blue)"
