unbind C-b
set -g prefix C-s
bind C-s send-prefix

# Core settings
set -g mouse on
set -sg escape-time 0
set -g history-limit 50000
set -g focus-events on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",tmux-256color:Tc"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Split panes
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind n next-window
bind p previous-window
bind-key -n M-h previous-window
bind-key -n M-l next-window
bind-key < swap-window -t -1 \; select-window -t -1
bind-key > swap-window -t +1 \; select-window -t +1

# Vi copy mode
setw -g mode-keys vi
bind [ copy-mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi r send -X rectangle-toggle
bind-key -T copy-mode-vi / send -X search-forward
bind-key -T copy-mode-vi ? send -X search-backward
bind-key -T copy-mode-vi n send -X search-again
bind-key -T copy-mode-vi N send -X search-reverse

# Status bar
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-justify left

# Pane border
set -g pane-border-status off
set -g pane-border-lines single
set -g display-panes-time 1000

# Utility binds
bind x confirm-before -p "kill pane #P? (y/n)" kill-pane
bind & confirm-before -p "kill window #W? (y/n)" kill-window
bind s choose-tree -s
bind w choose-tree -w
bind S command-prompt -p "session name:" "new-session -d -s '%%' -c '#{pane_current_path}'"
bind C-l send-keys C-l \; clear-history
bind q display-panes
bind y setw synchronize-panes \; display-message "synchronize-panes #{?pane_synchronized,on,off}"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

# Load cpu and battery FIRST so catppuccin can use their variables
run ~/.tmux/plugins/tmux-cpu/cpu.tmux
run ~/.tmux/plugins/tmux-battery/battery.tmux

# Load catppuccin after
run ~/.tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Build status bar
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#[fg=#{@thm_overlay_0},bg=#{@thm_mantle}]  #{cpu_percentage} #[fg=#{@thm_green},bg=#{@thm_mantle}] #{battery_icon} #{battery_percentage} #[fg=#{@thm_blue},bg=#{@thm_mantle}] %d %b %H:%M "
set -g status-left-length 100
set -g status-right-length 100

# Initialize TPM (keep at very bottom)
run '~/.tmux/plugins/tpm/tpm'
