unbind C-b
set -g prefix C-s
bind C-s send-prefix

# Core settings
set -g mouse on
set -sg escape-time 0
set -g history-limit 50000
set -g focus-events on
set -g set-clipboard on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,tmux-256color:Tc,wezterm:Tc"
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Splits / windows
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind C new-session -c "#{pane_current_path}"

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vim-tmux-navigator support
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind n next-window
bind p previous-window
bind-key -n M-h previous-window
bind-key -n M-l next-window
bind-key -n M-H swap-window -t -1 \; select-window -t -1
bind-key -n M-L swap-window -t +1 \; select-window -t +1
bind-key < swap-window -t -1 \; select-window -t -1
bind-key > swap-window -t +1 \; select-window -t +1

# Vi copy mode
setw -g mode-keys vi
bind [ copy-mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi r send -X rectangle-toggle
bind-key -T copy-mode-vi / send -X search-forward
bind-key -T copy-mode-vi ? send -X search-backward
bind-key -T copy-mode-vi n send -X search-again
bind-key -T copy-mode-vi N send -X search-reverse
bind-key -T copy-mode-vi C-v send -X rectangle-toggle

# Pane border
set -g pane-border-status off
set -g pane-border-lines single
set -g display-panes-time 1000

# Utility binds
bind x confirm-before -p "kill pane #P? (y/n)" kill-pane
bind & confirm-before -p "kill window #W? (y/n)" kill-window
bind q display-panes
bind y setw synchronize-panes \; display-message "synchronize-panes #{?pane_synchronized,on,off}"
bind C-l send-keys C-l \; clear-history
bind u capture-pane -S - \; save-buffer /tmp/tmux-buffer \; display-message "saved pane to /tmp/tmux-buffer"

# TUI pickers
bind s choose-tree -Zs
bind w choose-tree -Zw

# Rename / create
bind S command-prompt -p "session name:" "new-session -d -s '%%' -c '#{pane_current_path}'"
bind R command-prompt -p "rename session:" "rename-session '%%'"
bind W command-prompt -p "rename window:" "rename-window '%%'"

# Popup TUI command picker
# Requires: brew install fzf
bind Space display-popup -E -w 90% -h 90% -d "#{pane_current_path}" '\
selected=$(cat <<EOF | fzf --prompt="tmux command > " --height=100% --border --reverse
Reload config
New window
Split horizontal
Split vertical
Choose session
Choose window
Rename session
Rename window
Kill pane
Kill window
Sync panes toggle
Clear pane/history
Lazygit popup
Floating shell
FZF files
Git branches
Project picker
EOF
); \
case "$selected" in \
  "Reload config") tmux source-file ~/.tmux.conf \; display-message "tmux config reloaded" ;; \
  "New window") tmux new-window -c "#{pane_current_path}" ;; \
  "Split horizontal") tmux split-window -h -c "#{pane_current_path}" ;; \
  "Split vertical") tmux split-window -v -c "#{pane_current_path}" ;; \
  "Choose session") tmux choose-tree -Zs ;; \
  "Choose window") tmux choose-tree -Zw ;; \
  "Rename session") tmux command-prompt -p "session name:" "rename-session %%" ;; \
  "Rename window") tmux command-prompt -p "window name:" "rename-window %%" ;; \
  "Kill pane") tmux confirm-before -p "kill pane #P? (y/n)" kill-pane ;; \
  "Kill window") tmux confirm-before -p "kill window #W? (y/n)" kill-window ;; \
  "Sync panes toggle") tmux setw synchronize-panes \; display-message "synchronize-panes #{?pane_synchronized,on,off}" ;; \
  "Clear pane/history") tmux send-keys C-l \; clear-history ;; \
  "Lazygit popup") tmux display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit" ;; \
  "Floating shell") tmux display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "$SHELL" ;; \
  "FZF files") tmux display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "fzf" ;; \
  "Git branches") tmux display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "git branch --all --color=always | fzf --ansi --prompt=\"branch > \"" ;; \
  "Project picker") tmux display-popup -E -w 90% -h 90% "zoxide query -l | fzf --prompt=\"project > \" --height=100% --border --reverse | xargs -I {} tmux new-window -c {}" ;; \
esac'

# Popup TUIs
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"
bind t display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "$SHELL"
bind f display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "fzf"
bind b display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "git branch --all --color=always | fzf --ansi --prompt='branch > '"

# Project picker using zoxide + fzf
# Requires: brew install zoxide fzf
bind P display-popup -E -w 90% -h 90% "zoxide query -l | fzf --prompt='project > ' --height=100% --border --reverse | xargs -I {} tmux new-window -c {}"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

# Catppuccin
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_pane_status_enabled 'off'

set -g @catppuccin_window_text " #I:#W "
set -g @catppuccin_window_current_text " #I:#W "

# Status bar
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-justify left
set -g status-left-length 120
set -g status-right-length 160
set -g status-style "bg=default"

# Left pill: session
set -g status-left "\
#[fg=#{@thm_blue},bg=default]\
#[fg=#{@thm_crust},bg=#{@thm_blue},bold]   #S \
#[fg=#{@thm_blue},bg=default] "

# Right pills: CPU | Battery | Date | Time
set -g status-right "\
#[fg=#{@thm_mantle},bg=default]\
#[fg=#{@thm_text},bg=#{@thm_mantle},bold]   #{cpu_percentage} \
#[fg=#{@thm_mantle},bg=default] \
#[fg=#{@thm_green},bg=default]\
#[fg=#{@thm_crust},bg=#{@thm_green},bold] #{battery_icon} #{battery_percentage} \
#[fg=#{@thm_green},bg=default] \
#[fg=#{@thm_mauve},bg=default]\
#[fg=#{@thm_crust},bg=#{@thm_mauve},bold]   %d %b \
#[fg=#{@thm_mauve},bg=default] \
#[fg=#{@thm_peach},bg=default]\
#[fg=#{@thm_crust},bg=#{@thm_peach},bold]   %H:%M \
#[fg=#{@thm_peach},bg=default]"

# Window pills
setw -g window-status-format "\
#[fg=#{@thm_surface_0},bg=default]\
#[fg=#{@thm_text},bg=#{@thm_surface_0}] #I:#W \
#[fg=#{@thm_surface_0},bg=default] "

setw -g window-status-current-format "\
#[fg=#{@thm_lavender},bg=default]\
#[fg=#{@thm_crust},bg=#{@thm_lavender},bold] #I:#W \
#[fg=#{@thm_lavender},bg=default] "

setw -g window-status-activity-style "fg=#{@thm_yellow},bg=default,bold"

# Borders
set -g pane-border-style "fg=#{@thm_surface_0}"
set -g pane-active-border-style "fg=#{@thm_blue}"

# Messages
set -g message-style "fg=#{@thm_crust},bg=#{@thm_blue},bold"
set -g message-command-style "fg=#{@thm_crust},bg=#{@thm_mauve},bold"

# TPM init
run '~/.tmux/plugins/tpm/tpm'
